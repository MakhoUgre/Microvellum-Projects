        /* ზოგადი გვერდის სტილი */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: #f0f2f5; 
            padding: 20px; 
            margin: 0;
        }

        /* სავიზიტო ბარათის კონტეინერი */
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            display: inline-block; 
            min-width: 320px; 
            max-width: 500px; 
            margin-top: 20px;
        }
        
        /* ლოგოს სტილი (წრიული ჩარჩო) */
        .logo { 
            width: 100px; 
            height: 100px; 
            background: #eee; 
            border-radius: 50%; 
            margin: 0 auto 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            border: 2px solid #007bff; 
        }
        .logo img { 
            width: 100%; 
            height: auto; 
        }

        /* სახელი და ქვესათაური */
        h1 { 
            color: #1a1a1a; 
            margin-bottom: 5px; 
            font-size: 24px; 
        }
        h3.project-title { 
            margin-top: 30px; 
            color: #333; 
        }

        /* საკონტაქტო ბლოკის სტილი */
        .contact { 
            margin-bottom: 25px; 
            color: #444; 
            font-size: 15px; 
            text-align: left; 
            background: #f9f9f9; 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px solid #eee;
        }
        .contact p { 
            margin: 10px 0; 
            display: flex; 
            align-items: center; 
        }
        .contact i { 
            margin-right: 12px; 
            font-size: 18px; 
            width: 20px; /* ფიქსირებული სიგანე ხატულებისთვის */
            text-align: center;
        }
        
        /* ხატულების სპეციფიკური ფერები */
        .fa-whatsapp { color: #25D366; }
        .fa-github { color: #24292e; }
        .fa-linkedin { color: #0077b5; }
        .fa-envelope { color: #ea4335; }
        
        .contact a { 
            color: #007bff; 
            text-decoration: none; 
            font-weight: 500; 
        }
        .contact a:hover { 
            text-decoration: underline; 
        }

        /* პროექტის ღილაკების სტილი */
        .btn { 
            display: block; 
            background: #007bff; 
            color: white; 
            padding: 12px; 
            margin: 10px 0; 
            text-decoration: none; 
            border-radius: 6px; 
            font-weight: 500; 
            transition: 0.3s; 
            border: none; 
            cursor: pointer;
        }
        .btn:hover { 
            background: #0056b3; 
            transform: scale(1.02); 
            box-shadow: 0 2px 8px rgba(0,123,255,0.3);
        }
        
        /* ჰორიზონტალური ხაზი */
        hr { 
            border: 0; 
            border-top: 1px solid #eee; 
            margin: 25px 0; 
        }
